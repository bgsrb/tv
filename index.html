<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>TV Remote Debug</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  .box {
    background: #222;
    border: 2px solid #444;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  #last {
    font-size: 28px;
    color: #00ff99;
  }

  #log {
    height: 500px;
    overflow: auto;
    background: #000;
    padding: 12px;
    border-radius: 10px;
    font-size: 16px;
    direction: ltr;
  }

  .test-btn {
    padding: 20px;
    margin: 10px;
    font-size: 20px;
  }
</style>
</head>

<body>

<div class="box">
  <h1>TV Remote Event Debug</h1>
  <div id="last">Waiting...</div>
</div>

<div class="box">
  <button class="test-btn">Button 1</button>
  <button class="test-btn">Button 2</button>
  <button class="test-btn">Button 3</button>
</div>

<div id="log"></div>

<script>
const last = document.getElementById("last");
const log = document.getElementById("log");

function addLog(text) {
  const time = new Date().toLocaleTimeString();
  const line = document.createElement("div");
  line.textContent = "[" + time + "] " + text;
  log.prepend(line);
  last.textContent = text;
}

function keyName(e) {
  return `
KEYBOARD:
key=${e.key}
code=${e.code}
keyCode=${e.keyCode}
which=${e.which}
repeat=${e.repeat}
`;
}

function mouseName(e) {
  return `
MOUSE:
type=${e.type}
x=${e.clientX}
y=${e.clientY}
button=${e.button}
buttons=${e.buttons}
movementX=${e.movementX}
movementY=${e.movementY}
`;
}

document.addEventListener("keydown", e => {
  addLog(keyName(e));
});

document.addEventListener("keyup", e => {
  addLog("KEY UP: key=" + e.key + " code=" + e.code + " keyCode=" + e.keyCode);
});

document.addEventListener("mousemove", e => {
  addLog(mouseName(e));
});

document.addEventListener("mousedown", e => {
  addLog(mouseName(e));
});

document.addEventListener("mouseup", e => {
  addLog(mouseName(e));
});

document.addEventListener("click", e => {
  addLog("CLICK: target=" + e.target.tagName + " text=" + e.target.textContent.trim());
});

document.addEventListener("wheel", e => {
  addLog("WHEEL: deltaX=" + e.deltaX + " deltaY=" + e.deltaY);
});

document.addEventListener("touchstart", e => {
  addLog("TOUCH START: touches=" + e.touches.length);
});

document.addEventListener("touchmove", e => {
  addLog("TOUCH MOVE: touches=" + e.touches.length);
});

document.addEventListener("touchend", e => {
  addLog("TOUCH END");
});
</script>

</body>
</html>
