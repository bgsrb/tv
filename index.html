<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>YouTube TV MouseMove Remote Navigation</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100vh;
}

.sidebar {
  background: #111;
  padding: 16px;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 24px;
}

.nav-item,
.card {
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
}

.nav-item {
  width: 100%;
  padding: 14px;
  margin-bottom: 8px;
  background: transparent;
  color: white;
  border: 0;
  border-radius: 10px;
  text-align: left;
  font-size: 15px;
}

.nav-item.focused {
  background: #333;
}

.content {
  padding: 20px;
  overflow: hidden;
}

.section {
  margin-bottom: 34px;
}

.section h2 {
  margin: 0 0 12px;
  font-size: 22px;
}

.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.card {
  height: 150px;
  background: #202020;
  border-radius: 14px;
  border: 3px solid transparent;
  color: white;
  font-size: 22px;
}

.card.focused {
  border-color: red;
  transform: scale(1.04);
}
</style>
</head>

<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">▶ YouTube</div>
    <button class="nav-item" data-focusable>Home</button>
    <button class="nav-item" data-focusable>Shorts</button>
    <button class="nav-item" data-focusable>Subscriptions</button>
    <button class="nav-item" data-focusable>History</button>
    <button class="nav-item" data-focusable>Playlists</button>
    <button class="nav-item" data-focusable>Downloads</button>
  </aside>

  <main class="content">
    <section class="section">
      <h2>System Design</h2>
      <div class="row">
        <button class="card" data-focusable>Kafka</button>
        <button class="card" data-focusable>Queues</button>
        <button class="card" data-focusable>Concurrency</button>
        <button class="card" data-focusable>Bot Detection</button>
      </div>
    </section>

    <section class="section">
      <h2>Low Level Design</h2>
      <div class="row">
        <button class="card" data-focusable>Locker</button>
        <button class="card" data-focusable>Connect 4</button>
        <button class="card" data-focusable>Cache</button>
        <button class="card" data-focusable>Database</button>
      </div>
    </section>

    <section class="section">
      <h2>Interviews</h2>
      <div class="row">
        <button class="card" data-focusable>Behavioral</button>
        <button class="card" data-focusable>Q&A</button>
        <button class="card" data-focusable>Live</button>
        <button class="card" data-focusable>Top-K</button>
      </div>
    </section>
  </main>
</div>

<script>
const items = [...document.querySelectorAll("[data-focusable]")];

let current = 0;
let lastX = null;
let lastY = null;

let accX = 0;
let accY = 0;

const THRESHOLD_X = 10;
const THRESHOLD_Y = 7;

function clearFocus() {
  items.forEach(el => el.classList.remove("focused"));
}

function setFocus(index) {
  current = Math.max(0, Math.min(index, items.length - 1));
  clearFocus();
  items[current].classList.add("focused");
  items[current].scrollIntoView({ block: "nearest", inline: "nearest" });
}

function getCenter(el) {
  const r = el.getBoundingClientRect();
  return {
    x: r.left + r.width / 2,
    y: r.top + r.height / 2
  };
}

function move(direction) {
  const active = items[current];
  const activeCenter = getCenter(active);

  let candidates = items
    .map((el, index) => {
      const c = getCenter(el);
      const dx = c.x - activeCenter.x;
      const dy = c.y - activeCenter.y;

      return { el, index, dx, dy };
    })
    .filter(x => {
      if (direction === "right") return x.dx > 20;
      if (direction === "left") return x.dx < -20;
      if (direction === "down") return x.dy > 20;
      if (direction === "up") return x.dy < -20;
    })
    .sort((a, b) => {
      if (direction === "right" || direction === "left") {
        return Math.abs(a.dx) - Math.abs(b.dx) || Math.abs(a.dy) - Math.abs(b.dy);
      }

      return Math.abs(a.dy) - Math.abs(b.dy) || Math.abs(a.dx) - Math.abs(b.dx);
    });

  if (candidates.length) {
    setFocus(candidates[0].index);
  }
}

document.addEventListener("mousemove", e => {
  if (lastX === null) {
    lastX = e.clientX;
    lastY = e.clientY;
    return;
  }

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  accX += dx;
  accY += dy;

  if (Math.abs(accX) >= THRESHOLD_X && Math.abs(accX) > Math.abs(accY)) {
    if (accX > 0) move("right");
    else move("left");

    accX = 0;
    accY = 0;
  }

  if (Math.abs(accY) >= THRESHOLD_Y && Math.abs(accY) > Math.abs(accX)) {
    if (accY > 0) move("down");
    else move("up");

    accX = 0;
    accY = 0;
  }

  lastX = e.clientX;
  lastY = e.clientY;
});

document.addEventListener("click", () => {
  items[current].click();
});

items.forEach(el => {
  el.setAttribute("tabindex", "-1");

  el.addEventListener("click", () => {
    alert("Clicked: " + el.textContent.trim());
  });
});

setFocus(0);
</script>

</body>
</html>
