<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TV Spatial Navigation</title>

<script src="https://cdn.jsdelivr.net/npm/js-spatial-navigation/spatial_navigation.js"></script>

<style>
*,
*::before,
*::after {
  box-sizing: border-box;
  cursor: none !important;
}

body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

button {
  cursor: none !important;
  user-select: none;
  -webkit-user-select: none;
}

.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100vh;
}

.sidebar {
  background: #111;
  padding: 16px;
}

.logo {
  font-size: 24px;
  margin-bottom: 24px;
}

.nav-item {
  display: block;
  width: 100%;
  padding: 14px;
  margin-bottom: 8px;
  background: transparent;
  color: white;
  border: 0;
  border-radius: 10px;
  text-align: left;
  font-size: 16px;
}

.nav-item:focus {
  background: #333;
}

.content {
  padding: 24px;
  overflow: hidden;
}

.section {
  margin-bottom: 34px;
}

.section-title {
  margin: 0 0 14px;
  font-size: 22px;
}

.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.card {
  height: 150px;
  background: #202020;
  color: white;
  border-radius: 14px;
  border: 3px solid transparent;
  font-size: 22px;
}

.card:focus {
  border-color: red;
  transform: scale(1.04);
}
</style>
</head>

<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">▶ YouTube</div>
    <button class="nav-item focusable">Home</button>
    <button class="nav-item focusable">Explore</button>
    <button class="nav-item focusable">Subscriptions</button>
    <button class="nav-item focusable">Library</button>
  </aside>

  <main class="content">

    <section class="section">
      <h2 class="section-title">System Design</h2>
      <div class="row">
        <button class="card focusable">Kafka</button>
        <button class="card focusable">Queues</button>
        <button class="card focusable">Concurrency</button>
        <button class="card focusable">Bot Detection</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Low Level Design</h2>
      <div class="row">
        <button class="card focusable">Locker</button>
        <button class="card focusable">Connect 4</button>
        <button class="card focusable">Cache</button>
        <button class="card focusable">Database</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Interviews</h2>
      <div class="row">
        <button class="card focusable">Behavioral</button>
        <button class="card focusable">Q&A</button>
        <button class="card focusable">Live Coding</button>
        <button class="card focusable">Top-K</button>
      </div>
    </section>

  </main>
</div>

<script>
SpatialNavigation.init();

SpatialNavigation.add({
  selector: ".focusable"
});

SpatialNavigation.makeFocusable();
SpatialNavigation.focus();

let lastX = null;
let lastY = null;
let accX = 0;
let accY = 0;

const THRESHOLD_X = 10;
const THRESHOLD_Y = 7;

function remoteMove(dir) {
  SpatialNavigation.move(dir);
}

document.addEventListener("mousemove", e => {
  if (lastX === null) {
    lastX = e.clientX;
    lastY = e.clientY;
    return;
  }

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  accX += dx;
  accY += dy;

  if (Math.abs(accX) > THRESHOLD_X && Math.abs(accX) > Math.abs(accY)) {
    remoteMove(accX > 0 ? "right" : "left");
    accX = 0;
    accY = 0;
  }

  if (Math.abs(accY) > THRESHOLD_Y && Math.abs(accY) > Math.abs(accX)) {
    remoteMove(accY > 0 ? "down" : "up");
    accX = 0;
    accY = 0;
  }

  lastX = e.clientX;
  lastY = e.clientY;
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") remoteMove("right");
  if (e.key === "ArrowLeft") remoteMove("left");
  if (e.key === "ArrowDown") remoteMove("down");
  if (e.key === "ArrowUp") remoteMove("up");
});

document.addEventListener("click", () => {
  const el = document.activeElement;
  if (el) el.classList.add("selected");
});
</script>

</body>
</html>
